<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 920" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#00d4ff"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#e94560"/>
    </marker>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1500" height="920" fill="url(#bgGrad)" rx="12"/>

  <!-- Title -->
  <text x="750" y="40" text-anchor="middle" fill="#00d4ff" font-size="22" font-weight="bold">Atlas DCT Infrastructure Intelligence — Architecture Evolution</text>

  <!-- ============================================ -->
  <!-- CURRENT STATE (Left Side) -->
  <!-- ============================================ -->
  <rect x="30" y="60" width="700" height="840" rx="10" fill="none" stroke="#e94560" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="380" y="85" text-anchor="middle" fill="#e94560" font-size="16" font-weight="bold">CURRENT STATE (In-Memory Pipeline)</text>

  <!-- User -->
  <circle cx="130" cy="130" r="16" fill="#e94560"/>
  <text x="130" y="165" text-anchor="middle" fill="#ccc" font-size="11">User</text>

  <!-- Upload arrow -->
  <line x1="146" y1="130" x2="220" y2="175" stroke="#00d4ff" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="165" y="145" fill="#888" font-size="9">Upload Excel/CSV</text>

  <!-- Flask -->
  <rect x="220" y="105" width="240" height="85" rx="6" fill="#16213e" stroke="#444466"/>
  <text x="340" y="125" text-anchor="middle" fill="#00d4ff" font-size="12" font-weight="bold">Flask Web App</text>
  <text x="340" y="140" text-anchor="middle" fill="#888" font-size="10">demo_web_app.py :5050</text>
  <rect x="230" y="148" width="105" height="28" rx="4" fill="#0f3460" stroke="#333"/>
  <text x="282" y="166" text-anchor="middle" fill="#ccc" font-size="9">/api/upload-count</text>
  <rect x="345" y="148" width="105" height="28" rx="4" fill="#0f3460" stroke="#333"/>
  <text x="397" y="166" text-anchor="middle" fill="#ccc" font-size="9">/api/sheet-qa</text>

  <!-- Question arrow from user -->
  <line x1="146" y1="135" x2="345" y2="175" stroke="#00d4ff" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="265" y="168" fill="#888" font-size="9">Ask question</text>

  <!-- Normalizer -->
  <rect x="170" y="210" width="240" height="75" rx="6" fill="#16213e" stroke="#444466"/>
  <text x="290" y="230" text-anchor="middle" fill="#00d4ff" font-size="11" font-weight="bold">Cutsheet Normalizer</text>
  <text x="290" y="244" text-anchor="middle" fill="#888" font-size="9">cutsheet_normalizer.py</text>
  <rect x="180" y="252" width="100" height="24" rx="4" fill="#0f3460" stroke="#333"/>
  <text x="230" y="268" text-anchor="middle" fill="#ccc" font-size="8">normalize_cutsheet()</text>
  <rect x="290" y="252" width="110" height="24" rx="4" fill="#0f3460" stroke="#333"/>
  <text x="345" y="268" text-anchor="middle" fill="#ccc" font-size="8">build_llm_context()</text>

  <!-- Arrow upload -> normalizer -->
  <line x1="282" y1="176" x2="282" y2="210" stroke="#00d4ff" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- In-Memory Cache -->
  <rect x="220" y="310" width="220" height="50" rx="6" fill="#e94560" fill-opacity="0.15" stroke="#e94560" stroke-width="2"/>
  <text x="330" y="333" text-anchor="middle" fill="#e94560" font-size="12" font-weight="bold">In-Memory Cache</text>
  <text x="330" y="350" text-anchor="middle" fill="#ccc" font-size="9">pandas DataFrames</text>

  <!-- Arrow normalizer -> cache -->
  <line x1="290" y1="285" x2="315" y2="310" stroke="#00d4ff" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="260" y="300" fill="#e94560" font-size="8" font-weight="bold">ENTIRE context dict</text>

  <!-- Pain Point Note -->
  <rect x="470" y="290" width="245" height="100" rx="6" fill="#0f3460" stroke="#e94560" stroke-dasharray="4,2"/>
  <text x="485" y="310" fill="#e94560" font-size="10" font-weight="bold">⚠ Pain Point</text>
  <text x="485" y="326" fill="#ccc" font-size="9">Every question sends ALL data</text>
  <text x="485" y="340" fill="#ccc" font-size="9">as JSON (~8k+ tokens for Quincy).</text>
  <text x="485" y="358" fill="#ccc" font-size="9">At 100k+ rows or multi-site:</text>
  <text x="485" y="372" fill="#e94560" font-size="9">• Token limit exceeded</text>
  <text x="485" y="384" fill="#e94560" font-size="9">• Cost explodes per question</text>

  <!-- Grounded AI -->
  <rect x="195" y="385" width="260" height="65" rx="6" fill="#16213e" stroke="#444466"/>
  <text x="325" y="405" text-anchor="middle" fill="#00d4ff" font-size="11" font-weight="bold">Grounded AI</text>
  <text x="325" y="418" text-anchor="middle" fill="#888" font-size="9">demo_auth_ai.py</text>
  <rect x="205" y="425" width="110" height="20" rx="4" fill="#0f3460" stroke="#333"/>
  <text x="260" y="439" text-anchor="middle" fill="#ccc" font-size="8">ask_grounded()</text>
  <rect x="325" y="425" width="120" height="20" rx="4" fill="#0f3460" stroke="#333"/>
  <text x="385" y="439" text-anchor="middle" fill="#ccc" font-size="8">Fallback Chain</text>

  <!-- Arrow cache -> AI -->
  <line x1="330" y1="360" x2="325" y2="385" stroke="#e94560" stroke-width="2" marker-end="url(#arrow-red)"/>
  <text x="350" y="375" fill="#e94560" font-size="8" font-weight="bold">~8k+ tokens</text>

  <!-- Resilience Layer -->
  <rect x="175" y="475" width="310" height="55" rx="6" fill="#16213e" stroke="#444466"/>
  <text x="330" y="493" text-anchor="middle" fill="#00d4ff" font-size="11" font-weight="bold">LLM Resilience Layer</text>
  <rect x="185" y="502" width="80" height="20" rx="4" fill="#0f3460" stroke="#333"/>
  <text x="225" y="516" text-anchor="middle" fill="#ccc" font-size="8">@with_retry</text>
  <rect x="275" y="502" width="90" height="20" rx="4" fill="#0f3460" stroke="#333"/>
  <text x="320" y="516" text-anchor="middle" fill="#ccc" font-size="8">@with_timeout</text>
  <rect x="375" y="502" width="90" height="20" rx="4" fill="#0f3460" stroke="#333"/>
  <text x="420" y="516" text-anchor="middle" fill="#ccc" font-size="8">@with_cache</text>

  <!-- Arrow AI -> resilience -->
  <line x1="325" y1="450" x2="330" y2="475" stroke="#00d4ff" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Claude cloud -->
  <ellipse cx="260" cy="580" rx="80" ry="25" fill="#16213e" stroke="#444466"/>
  <text x="260" y="577" text-anchor="middle" fill="#00d4ff" font-size="10" font-weight="bold">Anthropic API</text>
  <text x="260" y="592" text-anchor="middle" fill="#888" font-size="9">Claude (Primary)</text>

  <!-- OpenAI cloud -->
  <ellipse cx="420" cy="580" rx="75" ry="25" fill="#16213e" stroke="#444466"/>
  <text x="420" y="577" text-anchor="middle" fill="#ccc" font-size="10" font-weight="bold">OpenAI API</text>
  <text x="420" y="592" text-anchor="middle" fill="#888" font-size="9">GPT-4o (Fallback)</text>

  <!-- Arrows to clouds -->
  <line x1="290" y1="530" x2="265" y2="555" stroke="#00d4ff" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="370" y1="530" x2="405" y2="555" stroke="#888" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow)"/>

  <!-- ============================================ -->
  <!-- FUTURE STATE (Right Side) -->
  <!-- ============================================ -->
  <rect x="770" y="60" width="700" height="840" rx="10" fill="none" stroke="#00d4ff" stroke-width="2"/>
  <text x="1120" y="85" text-anchor="middle" fill="#00d4ff" font-size="16" font-weight="bold">FUTURE STATE (Postgres-Backed Pipeline)</text>

  <!-- User -->
  <circle cx="870" cy="130" r="16" fill="#00d4ff"/>
  <text x="870" y="165" text-anchor="middle" fill="#ccc" font-size="11">User</text>

  <!-- Flask -->
  <rect x="960" y="105" width="240" height="85" rx="6" fill="#16213e" stroke="#444466"/>
  <text x="1080" y="125" text-anchor="middle" fill="#00d4ff" font-size="12" font-weight="bold">Flask Web App</text>
  <text x="1080" y="140" text-anchor="middle" fill="#888" font-size="10">demo_web_app.py :5050</text>
  <rect x="970" y="148" width="105" height="28" rx="4" fill="#0f3460" stroke="#333"/>
  <text x="1022" y="166" text-anchor="middle" fill="#ccc" font-size="9">/api/upload-count</text>
  <rect x="1085" y="148" width="105" height="28" rx="4" fill="#0f3460" stroke="#333"/>
  <text x="1137" y="166" text-anchor="middle" fill="#ccc" font-size="9">/api/sheet-qa</text>

  <!-- Arrows from user -->
  <line x1="886" y1="125" x2="960" y2="155" stroke="#00d4ff" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="895" y="132" fill="#888" font-size="9">Upload (one-time)</text>
  <line x1="886" y1="138" x2="1085" y2="168" stroke="#00d4ff" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Data Loader -->
  <rect x="910" y="210" width="220" height="75" rx="6" fill="#16213e" stroke="#444466"/>
  <text x="1020" y="230" text-anchor="middle" fill="#00d4ff" font-size="11" font-weight="bold">Data Loader</text>
  <text x="1020" y="244" text-anchor="middle" fill="#888" font-size="9">atlas_data_loader.py</text>
  <rect x="920" y="252" width="90" height="22" rx="4" fill="#0f3460" stroke="#333"/>
  <text x="965" y="267" text-anchor="middle" fill="#ccc" font-size="8">load_cutsheet()</text>
  <rect x="1020" y="252" width="100" height="22" rx="4" fill="#0f3460" stroke="#333"/>
  <text x="1070" y="267" text-anchor="middle" fill="#ccc" font-size="8">load_site_hosts()</text>

  <!-- Arrow upload -> loader -->
  <line x1="1022" y1="176" x2="1020" y2="210" stroke="#00d4ff" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- PostgreSQL -->
  <rect x="890" y="310" width="280" height="110" rx="8" fill="#16213e" stroke="#00d4ff" stroke-width="2"/>
  <text x="1030" y="332" text-anchor="middle" fill="#00d4ff" font-size="13" font-weight="bold" filter="url(#glow)">PostgreSQL :9000</text>
  <rect x="900" y="340" width="70" height="22" rx="4" fill="#0f3460" stroke="#333"/>
  <text x="935" y="355" text-anchor="middle" fill="#ccc" font-size="8">devices</text>
  <rect x="980" y="340" width="85" height="22" rx="4" fill="#0f3460" stroke="#333"/>
  <text x="1022" y="355" text-anchor="middle" fill="#ccc" font-size="8">connections</text>
  <rect x="1075" y="340" width="85" height="22" rx="4" fill="#0f3460" stroke="#333"/>
  <text x="1117" y="355" text-anchor="middle" fill="#ccc" font-size="8">node_data</text>
  <rect x="900" y="372" width="120" height="22" rx="4" fill="#00d4ff" fill-opacity="0.15" stroke="#00d4ff"/>
  <text x="960" y="387" text-anchor="middle" fill="#00d4ff" font-size="8" font-weight="bold">optic_inventory (MV)</text>
  <rect x="1030" y="372" width="130" height="22" rx="4" fill="#00d4ff" fill-opacity="0.15" stroke="#00d4ff"/>
  <text x="1095" y="387" text-anchor="middle" fill="#00d4ff" font-size="8" font-weight="bold">cable_status_summary (MV)</text>
  <text x="1030" y="410" text-anchor="middle" fill="#666" font-size="8">+ sites, data_halls, site_vars, ip_assignments, topology_sections</text>

  <!-- Arrow loader -> pg -->
  <line x1="1020" y1="285" x2="1025" y2="310" stroke="#00d4ff" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="1035" y="300" fill="#888" font-size="8">Bulk INSERT + refresh views</text>

  <!-- Query Router (NEW) -->
  <rect x="920" y="445" width="240" height="75" rx="6" fill="#16213e" stroke="#00d4ff" stroke-width="2"/>
  <rect x="1090" y="440" width="45" height="16" rx="3" fill="#e94560"/>
  <text x="1112" y="451" text-anchor="middle" fill="white" font-size="8" font-weight="bold">NEW</text>
  <text x="1040" y="468" text-anchor="middle" fill="#00d4ff" font-size="12" font-weight="bold">Query Router</text>
  <rect x="930" y="480" width="100" height="22" rx="4" fill="#0f3460" stroke="#333"/>
  <text x="980" y="495" text-anchor="middle" fill="#ccc" font-size="8">Question Classifier</text>
  <rect x="1040" y="480" width="110" height="22" rx="4" fill="#0f3460" stroke="#333"/>
  <text x="1095" y="495" text-anchor="middle" fill="#ccc" font-size="8">Query Templates</text>

  <!-- Arrow QA -> router -->
  <line x1="1137" y1="176" x2="1137" y2="190" stroke="#00d4ff" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="1137" y1="190" x2="1200" y2="190" stroke="#00d4ff" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="1200" y1="190" x2="1200" y2="470" stroke="#00d4ff" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="1200" y1="470" x2="1160" y2="470" stroke="#00d4ff" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="1210" y="340" fill="#888" font-size="8" transform="rotate(90,1210,340)">Natural language question</text>

  <!-- Arrow router <-> pg -->
  <line x1="1040" y1="445" x2="1035" y2="420" stroke="#00d4ff" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="955" y="435" fill="#00d4ff" font-size="8" font-weight="bold">Targeted SQL</text>

  <!-- Grounded AI -->
  <rect x="935" y="545" width="230" height="55" rx="6" fill="#16213e" stroke="#444466"/>
  <text x="1050" y="565" text-anchor="middle" fill="#00d4ff" font-size="11" font-weight="bold">Grounded AI</text>
  <rect x="945" y="573" width="100" height="20" rx="4" fill="#0f3460" stroke="#333"/>
  <text x="995" y="587" text-anchor="middle" fill="#ccc" font-size="8">ask_grounded()</text>
  <rect x="1055" y="573" width="100" height="20" rx="4" fill="#0f3460" stroke="#333"/>
  <text x="1105" y="587" text-anchor="middle" fill="#ccc" font-size="8">Fallback Chain</text>

  <!-- Arrow router -> AI -->
  <line x1="1040" y1="520" x2="1045" y2="545" stroke="#00d4ff" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="1055" y="535" fill="#00d4ff" font-size="9" font-weight="bold">~1-2k tokens</text>

  <!-- Resilience -->
  <rect x="915" y="625" width="280" height="50" rx="6" fill="#16213e" stroke="#444466"/>
  <text x="1055" y="643" text-anchor="middle" fill="#00d4ff" font-size="10" font-weight="bold">LLM Resilience Layer</text>
  <rect x="925" y="651" width="75" height="18" rx="4" fill="#0f3460" stroke="#333"/>
  <text x="962" y="664" text-anchor="middle" fill="#ccc" font-size="8">@retry</text>
  <rect x="1010" y="651" width="80" height="18" rx="4" fill="#0f3460" stroke="#333"/>
  <text x="1050" y="664" text-anchor="middle" fill="#ccc" font-size="8">@timeout</text>
  <rect x="1100" y="651" width="80" height="18" rx="4" fill="#0f3460" stroke="#333"/>
  <text x="1140" y="664" text-anchor="middle" fill="#ccc" font-size="8">@cache</text>

  <!-- Arrow AI -> resilience -->
  <line x1="1050" y1="600" x2="1055" y2="625" stroke="#00d4ff" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Clouds -->
  <ellipse cx="990" cy="725" rx="80" ry="25" fill="#16213e" stroke="#444466"/>
  <text x="990" y="722" text-anchor="middle" fill="#00d4ff" font-size="10" font-weight="bold">Anthropic API</text>
  <text x="990" y="737" text-anchor="middle" fill="#888" font-size="9">Claude (Primary)</text>
  <ellipse cx="1150" cy="725" rx="75" ry="25" fill="#16213e" stroke="#444466"/>
  <text x="1150" y="722" text-anchor="middle" fill="#ccc" font-size="10" font-weight="bold">OpenAI API</text>
  <text x="1150" y="737" text-anchor="middle" fill="#888" font-size="9">GPT-4o (Fallback)</text>

  <line x1="1020" y1="675" x2="995" y2="700" stroke="#00d4ff" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="1100" y1="675" x2="1135" y2="700" stroke="#888" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow)"/>

  <!-- Key Benefits Note -->
  <rect x="800" y="770" width="310" height="115" rx="6" fill="#0f3460" stroke="#00d4ff"/>
  <text x="815" y="790" fill="#00d4ff" font-size="11" font-weight="bold">Key Benefits</text>
  <text x="815" y="810" fill="#ccc" font-size="10">✓ Load once, query forever (no re-upload)</text>
  <text x="815" y="828" fill="#ccc" font-size="10">✓ ~1-2k tokens vs ~8k+ per question</text>
  <text x="815" y="846" fill="#ccc" font-size="10">✓ Multi-site: load QCY, ELD, query across</text>
  <text x="815" y="864" fill="#ccc" font-size="10">✓ Scales to 100k+ rows, cost stays flat</text>
  <text x="815" y="882" fill="#ccc" font-size="10">✓ Versioned uploads with delta tracking</text>

  <!-- Comparison Note -->
  <rect x="1130" y="770" width="310" height="115" rx="6" fill="#0f3460" stroke="#e94560"/>
  <text x="1145" y="790" fill="#e94560" font-size="11" font-weight="bold">Query Template Examples</text>
  <text x="1145" y="810" fill="#ccc" font-size="9">"LLDP failures?" → cable_status_summary view</text>
  <text x="1145" y="828" fill="#ccc" font-size="9">"Device connections?" → connections WHERE dns</text>
  <text x="1145" y="846" fill="#ccc" font-size="9">"Optic counts?" → optic_inventory view</text>
  <text x="1145" y="864" fill="#ccc" font-size="9">"Cross-site?" → JOIN sites + connections</text>
  <text x="1145" y="882" fill="#ccc" font-size="9">"Node specs?" → node_data + devices</text>

  <!-- Center divider -->
  <line x1="750" y1="80" x2="750" y2="880" stroke="#444466" stroke-width="1" stroke-dasharray="6,4"/>
  <text x="750" y="890" text-anchor="middle" fill="#888" font-size="20">→</text>
  <text x="750" y="910" text-anchor="middle" fill="#888" font-size="10">Evolution</text>

</svg>
