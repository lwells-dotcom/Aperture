apiVersion: v1
kind: Secret
metadata:
  name: {{ include "atlas.secretName" . }}
  labels:
    {{- include "atlas.labels" . | nindent 4 }}
type: Opaque
stringData:
  DB_PASSWORD: {{ required "secrets.dbPassword must be set (use --set secrets.dbPassword=... or a values file)" .Values.secrets.dbPassword | quote }}
  DEMO_VERIFY_PIN: {{ required "secrets.demoVerifyPin must be set" .Values.secrets.demoVerifyPin | quote }}
  DEMO_TOKEN_SECRET: {{ required "secrets.demoTokenSecret must be set to a 32+ byte hex string" .Values.secrets.demoTokenSecret | quote }}
  # Stabilizes Flask session signing across pod restarts. If unset, the app
  # falls back to a self-generated secret persisted in ATLAS_STATE_DIR, but
  # supplying it here makes session continuity independent of PVC state.
  FLASK_SECRET_KEY: {{ required "secrets.flaskSecretKey must be set to a 32+ byte hex string" .Values.secrets.flaskSecretKey | quote }}
  ANTHROPIC_API_KEY: {{ .Values.secrets.anthropicApiKey | quote }}
  OPENAI_API_KEY: {{ .Values.secrets.openaiApiKey | quote }}
  {{- if .Values.secrets.netboxApiToken }}
  NETBOX_API_TOKEN: {{ .Values.secrets.netboxApiToken | quote }}
  {{- end }}
  {{- if .Values.secrets.googleSaKeyJson }}
  GOOGLE_SA_KEY_JSON: {{ .Values.secrets.googleSaKeyJson | quote }}
  {{- end }}
