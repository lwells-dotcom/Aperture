apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "atlas.fullname" . }}-web
  labels:
    {{- include "atlas.web.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.web.replicaCount }}
  selector:
    matchLabels:
      {{- include "atlas.web.selectorLabels" . | nindent 6 }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        {{- include "atlas.web.selectorLabels" . | nindent 8 }}
      annotations:
        # Force pod restart when configmap or secret changes
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
    spec:
      {{- with .Values.web.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.web.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.web.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      # Wait for postgres to be ready before starting web pods
      initContainers:
        - name: fix-upload-perms
          image: busybox:1.36
          command: ["sh", "-c", "chown -R 1000:1000 /app/uploads && chmod 755 /app/uploads"]
          volumeMounts:
            - name: uploads
              mountPath: /app/uploads
        - name: wait-for-postgres
          image: "{{ .Values.postgres.image.repository }}:{{ .Values.postgres.image.tag }}"
          command:
            - sh
            - -c
            - |
              retries=0
              max_retries=30
              until pg_isready -h {{ include "atlas.fullname" . }}-postgres -p {{ .Values.postgres.port }} -U {{ .Values.postgres.user }}; do
                retries=$((retries + 1))
                if [ "$retries" -ge "$max_retries" ]; then
                  echo "Postgres not ready after $max_retries attempts, giving up."
                  exit 1
                fi
                echo "Waiting for postgres... ($retries/$max_retries)"
                sleep 2
              done
              echo "Postgres is ready."
      containers:
        - name: web
          image: "{{ .Values.web.image.repository }}:{{ .Values.web.image.tag }}"
          imagePullPolicy: {{ .Values.web.image.pullPolicy }}
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            readOnlyRootFilesystem: false
            allowPrivilegeEscalation: false
          ports:
            - containerPort: {{ .Values.web.port }}
              name: http
          envFrom:
            - configMapRef:
                name: {{ include "atlas.configmapName" . }}
            - secretRef:
                name: {{ include "atlas.secretName" . }}
          resources:
            {{- toYaml .Values.web.resources | nindent 12 }}
          volumeMounts:
            - name: uploads
              mountPath: /app/uploads
          livenessProbe:
            httpGet:
              path: {{ .Values.web.healthPath }}
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: {{ .Values.web.healthPath }}
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
      volumes:
        - name: uploads
          persistentVolumeClaim:
            claimName: {{ include "atlas.fullname" . }}-uploads
