{{- if .Values.postgres.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "atlas.fullname" . }}-postgres
  labels:
    {{- include "atlas.postgres.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  clusterIP: None  # Headless service for StatefulSet
  ports:
    - port: {{ .Values.postgres.port }}
      targetPort: pg
      name: pg
  selector:
    {{- include "atlas.postgres.selectorLabels" . | nindent 4 }}
{{- end }}
