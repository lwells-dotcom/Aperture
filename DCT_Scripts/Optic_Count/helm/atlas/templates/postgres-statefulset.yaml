{{- if .Values.postgres.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "atlas.fullname" . }}-postgres
  labels:
    {{- include "atlas.postgres.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "atlas.fullname" . }}-postgres
  replicas: 1
  selector:
    matchLabels:
      {{- include "atlas.postgres.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "atlas.postgres.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.postgres.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: postgres
          image: "{{ .Values.postgres.image.repository }}:{{ .Values.postgres.image.tag }}"
          ports:
            - containerPort: {{ .Values.postgres.port }}
              name: pg
          env:
            - name: POSTGRES_DB
              value: {{ .Values.postgres.database | quote }}
            - name: POSTGRES_USER
              value: {{ .Values.postgres.user | quote }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "atlas.secretName" . }}
                  key: DB_PASSWORD
          resources:
            {{- toYaml .Values.postgres.resources | nindent 12 }}
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql/data
              subPath: postgres
            {{- if .Values.schemaInit.enabled }}
            - name: schema-init
              mountPath: /docker-entrypoint-initdb.d/01_schema.sql
              subPath: atlas_schema.sql
              readOnly: true
            {{- end }}
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - {{ .Values.postgres.user }}
                - -d
                - {{ .Values.postgres.database }}
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 3
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - {{ .Values.postgres.user }}
                - -d
                - {{ .Values.postgres.database }}
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
      volumes:
        {{- if .Values.schemaInit.enabled }}
        - name: schema-init
          configMap:
            name: {{ include "atlas.fullname" . }}-schema
        {{- end }}
  volumeClaimTemplates:
    - metadata:
        name: pgdata
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if .Values.postgres.storage.storageClass }}
        storageClassName: {{ .Values.postgres.storage.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.postgres.storage.size }}
{{- end }}
