apiVersion: v1
kind: Service
metadata:
  name: {{ include "atlas.fullname" . }}-web
  labels:
    {{- include "atlas.web.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 3600
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "atlas.web.selectorLabels" . | nindent 4 }}
